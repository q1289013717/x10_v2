# Render.com 自动部署配置
# 推送代码到 GitHub 后，Render 自动检测此文件并部署

services:
  # === 后端 API ===
  - type: web
    name: x10-backend
    env: docker
    repo: https://github.com/你的用户名/x10
    rootDir: x10-backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # 手动在 Render Dashboard 填入 Neon 连接串
      - key: SECRET_KEY
        generateValue: true  # Render 自动生成
      - key: CORS_ORIGINS
        value: "https://你的用户名.github.io"
      - key: PYTHON_VERSION
        value: "3.11"
    autoDeploy: true
